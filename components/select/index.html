<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Select - Fintech UI Kit</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="select.css">
    <style>
        .demo-container {
            padding: 48px;
            max-width: 800px;
            margin: 0 auto;
        }
        .demo-section {
            margin-bottom: 300px; /* Space for dropdowns */
        }
        .demo-title {
            font-size: 24px;
            margin-bottom: 24px;
            color: var(--color-black-base);
        }
        .dark .demo-title {
            color: var(--color-white-base);
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 48px;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h1 class="demo-title">Custom Select Component</h1>

        <!-- Variants -->
        <div class="demo-section">
            <h2 class="demo-title">Interactive Varieties</h2>
            <div class="demo-grid">
                
                <!-- Default State -->
                <div class="select" id="select-demo-1" data-state="closed">
                    <button class="select__button">
                        <span class="select__value">Choose Currency</span>
                        <svg class="select__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                    <ul class="select__options">
                        <li class="select__option" data-value="USD">USD - US Dollar</li>
                        <li class="select__option" data-value="EUR">EUR - Euro</li>
                        <li class="select__option" data-value="GBP">GBP - British Pound</li>
                        <li class="select__option" data-value="JPY">JPY - Japanese Yen</li>
                    </ul>
                </div>

                <!-- Pre-selected -->
                <div class="select" id="select-demo-2" data-state="closed">
                    <button class="select__button">
                        <span class="select__value">USD - US Dollar</span>
                        <svg class="select__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                    <ul class="select__options">
                        <li class="select__option" data-value="USD" data-selected="true">USD - US Dollar</li>
                        <li class="select__option" data-value="EUR">EUR - Euro</li>
                        <li class="select__option" data-value="GBP">GBP - British Pound</li>
                    </ul>
                </div>

                <!-- Disabled -->
                <div class="select" data-disabled="true">
                    <button class="select__button">
                        <span class="select__value">Locked Selection</span>
                        <svg class="select__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                </div>

            </div>
        </div>

        <!-- Sizes -->
        <div class="demo-section" style="margin-bottom: 200px;">
            <h2 class="demo-title">Sizes</h2>
            <div class="demo-grid" style="align-items: flex-start;">
                <div class="select" data-size="small">
                    <button class="select__button"><span class="select__value">Small Select</span></button>
                </div>
                <div class="select" data-size="medium">
                    <button class="select__button"><span class="select__value">Medium Select</span></button>
                </div>
                <div class="select" data-size="large">
                    <button class="select__button"><span class="select__value">Large Select</span></button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../scripts/theme-sync.js"></script>
    <script>
        // Simple interactive logic for the demo
        document.querySelectorAll('.select').forEach(select => {
            const btn = select.querySelector('.select__button');
            const options = select.querySelectorAll('.select__option');
            const valueSpan = select.querySelector('.select__value');

            if (!btn) return;

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const currentStatus = select.getAttribute('data-state');
                const isOpen = currentStatus === 'open';
                
                // Close others
                document.querySelectorAll('.select').forEach(s => s.setAttribute('data-state', 'closed'));
                
                // Toggle this one
                select.setAttribute('data-state', isOpen ? 'closed' : 'open');
            });

            options.forEach(opt => {
                opt.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (valueSpan) valueSpan.textContent = opt.textContent;
                    options.forEach(o => o.removeAttribute('data-selected'));
                    opt.setAttribute('data-selected', 'true');
                    select.setAttribute('data-state', 'closed');
                });
            });
        });

        // Close dropdowns on outside click
        document.addEventListener('click', () => {
            document.querySelectorAll('.select').forEach(s => s.setAttribute('data-state', 'closed'));
        });
    </script>
</body>
</html>
