<!-- =============================================
     COMPONENTS/BUTTON/index.html
     Button Component – Full Demo + All Variants
     ============================================= -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech UI Kit • Button</title>

    <!-- Import tokens + global styles -->
    <link rel="stylesheet" href="../../tokens/tokens.css">
    <link rel="stylesheet" href="../../styles/global.css">

    <!-- Button styles -->
    <link rel="stylesheet" href="button.css">

    <style>
        /* Demo page only */
        .demo {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            font-family: var(--font-general);
        }

        .demo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--color-gray-base-regular);
            padding-bottom: 20px;
        }

        .demo-grid {
            display: grid;
            gap: 40px;
        }

        .variant-group {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
        }

        .demo-card {
            background: var(--color-surface-low-2);
            border-radius: var(--radius-m);
            padding: 24px;
            border: 1px solid var(--color-gray-base-extra);
        }

        .dark .demo-card {
            background: var(--color-surface-medium);
        }
    </style>
</head>

<body class="demo">
    <div class="demo-header">
        <h1 style="font-size: var(--font-size-title-m);">Button Component</h1>
    </div>

    <div class="demo-grid">

        <!-- 1. Primary + Sizes -->
        <div class="demo-card">
            <h3 style="margin-bottom: 16px;">Primary – All Sizes</h3>
            <div class="variant-group">
                <button class="button" data-variant="primary" data-size="small">Small</button>
                <button class="button" data-variant="primary" data-size="medium">Medium</button>
                <button class="button" data-variant="primary" data-size="large">Large</button>
            </div>
        </div>

        <!-- 2. All Variants -->
        <div class="demo-card">
            <h3 style="margin-bottom: 16px;">All Variants (Medium size)</h3>
            <div class="variant-group" style="flex-wrap: wrap;">
                <button class="button" data-variant="primary">Primary</button>
                <button class="button" data-variant="secondary">Secondary</button>
                <button class="button" data-variant="outline">Outline</button>
                <button class="button" data-variant="ghost">Ghost</button>
                <button class="button" data-variant="destructive">Destructive</button>
                <button class="button" data-variant="success">Success</button>
                <button class="button" data-variant="warning">Warning</button>
            </div>
        </div>

        <!-- 3. With Icon -->
        <div class="demo-card">
            <h3 style="margin-bottom: 16px;">With Icon</h3>
            <div class="variant-group">
                <button class="button" data-variant="primary" data-size="medium" data-icon="left">
                    <span class="button__icon">→</span>
                    <span class="button__label">Continue</span>
                </button>
                <button class="button" data-variant="primary" data-size="medium" data-icon="right">
                    <span class="button__label">Next</span>
                    <span class="button__icon">→</span>
                </button>
                <button class="button" data-variant="primary" data-size="medium" data-icon="only">
                    <span class="button__icon">⭐</span>
                </button>
            </div>
        </div>

        <!-- 4. With Badge -->
        <div class="demo-card">
            <h3 style="margin-bottom: 16px;">With Badge</h3>
            <button class="button" data-variant="primary" data-size="medium" data-badge="true">
                <span class="button__label">Notifications</span>
                <span class="button__badge">12</span>
            </button>
        </div>

        <!-- 5. Loading + Disabled States -->
        <div class="demo-card">
            <h3 style="margin-bottom: 16px;">States</h3>
            <div class="variant-group">
                <button class="button" data-variant="primary" data-size="medium" data-loading="true">
                    <span class="button__label">Loading…</span>
                </button>
                <button class="button" data-variant="primary" data-size="medium" data-disabled="true">
                    Disabled
                </button>
                <button class="button" data-variant="outline" data-size="medium" data-disabled="true">
                    Disabled Outline
                </button>
            </div>
        </div>

        <!-- 6. Full interactive example -->
        <div class="demo-card">
            <h3 style="margin-bottom: 16px;">Interactive Example (hover / focus works live)</h3>
            <button class="button" data-variant="primary" data-size="large" data-icon="left">
                <span class="button__icon">💳</span>
                <span class="button__label">Pay Now</span>
            </button>
            <p style="margin-top: 12px; font-size: 13px; opacity: 0.7;">Try hovering and focusing this button</p>
        </div>

    </div>

    <script src="../../scripts/theme-sync.js"></script>
</body>

</html>
